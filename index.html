<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aim Lab 靶场 | 横屏点击射击</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, 'Helvetica Neue', sans-serif;
            touch-action: none; /* 禁止触摸滚动 */
            background: #0a0c15;
        }
        /* 横屏适配：canvas 填满全屏 */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            display: flex;
            gap: 20px;
            z-index: 10;
            pointer-events: none;
            font-size: 1.2rem;
        }
        .score, .time, .best {
            font-size: 1.4rem;
            letter-spacing: 1px;
        }
        .score span, .time span, .best span {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-right: 6px;
        }
        /* 十字准星 (长度适中) */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 20;
        }
        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }
        .crosshair::before {
            width: 12px;
            height: 2px;
            top: -1px;
            left: -6px;
        }
        .crosshair::after {
            width: 2px;
            height: 12px;
            top: -6px;
            left: -1px;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px 40px;
            border-radius: 40px;
            text-align: center;
            color: white;
            z-index: 30;
            display: none;
            backdrop-filter: blur(12px);
            pointer-events: auto;
            min-width: 260px;
        }
        .game-over h2 {
            font-size: 1.8rem;
            margin-bottom: 12px;
        }
        .stats {
            margin: 12px 0;
            font-size: 1rem;
            text-align: left;
            line-height: 1.5;
        }
        .stats p {
            margin: 4px 0;
        }
        .game-over button {
            background: #f97316;
            border: none;
            padding: 8px 20px;
            font-size: 1.1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 12px;
        }
        @media (orientation: portrait) {
            /* 竖屏时提示旋转 */
            .ui-panel { top: 10px; left: 10px; font-size: 1rem; }
            .score, .time, .best { font-size: 1rem; }
        }
        @media (max-width: 600px) {
            .ui-panel { padding: 5px 12px; gap: 12px; }
            .score, .time, .best { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="ui-panel">
        <div class="score">🎯 <span>得分</span> <span id="scoreValue">0</span></div>
        <div class="time">⏱️ <span>剩余</span> <span id="timeValue">60</span>s</div>
        <div class="best">🏆 <span>最高分</span> <span id="bestValue">0</span></div>
    </div>
    <div class="crosshair" id="crosshair"></div>
    <div class="game-over" id="gameOverPanel">
        <h2>训练结束</h2>
        <div class="stats" id="statsPanel"></div>
        <button id="restartBtn">重新开始</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 初始化场景，横屏自动适配 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.008);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 5);
        // 固定视角：不旋转，准星永远在屏幕中心，点击即射击
        // 手机端无滑动瞄准，因此不需要yaw/pitch控制；保留电脑端鼠标控制可选，但为了简单，统一不做视角旋转
        // 为了保持体验，我们取消所有视角控制，只使用中心瞄准。这样手机点击直接射击，帧率最高。
        // 电脑端仍然可以使用鼠标瞄准（通过移动鼠标改变yaw/pitch），我们保留鼠标控制，但禁用手机滑动。
        let yaw = 0;
        let pitch = 0;
        const pitchLimit = Math.PI / 2.2;
        function updateCameraDirection() {
            const quaternion = new THREE.Quaternion();
            quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            camera.quaternion.copy(quaternion);
        }
        updateCameraDirection();

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        const canvas = renderer.domElement;
        canvas.style.touchAction = 'none';

        // --- 灯光 ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(3, 5, 2);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x445566, 0.5);
        backLight.position.set(-2, 2, -3);
        scene.add(backLight);
        
        const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(18, 12),
            new THREE.ShadowMaterial({ opacity: 0.5, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        const backWall = new THREE.Mesh(
            new THREE.BoxGeometry(14, 4, 0.2),
            new THREE.MeshStandardMaterial({ color: 0x2c3e66, roughness: 0.5, metalness: 0.1 })
        );
        backWall.position.set(0, 1.8, -2.5);
        backWall.receiveShadow = true;
        scene.add(backWall);
        
        // --- 靶子模型 (等比例缩小) ---
        function createTarget() {
            const group = new THREE.Group();
            const bodyGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.6, 16);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xaa5533, roughness: 0.3 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            body.position.y = 0;
            group.add(body);
            const headGeo = new THREE.SphereGeometry(0.19, 16, 16);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xdd8866 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 0.48;
            head.castShadow = true;
            head.userData = { isHead: true };
            group.add(head);
            const ringGeo = new THREE.TorusGeometry(0.4, 0.04, 16, 32);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa66 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = 0.03;
            group.add(ring);
            return group;
        }
        
        function getRandomPosition() {
            const x = (Math.random() - 0.5) * 5;
            const z = -2.5 + Math.random() * 2.5;
            const y = 0.3 + Math.random() * 0.6;
            return new THREE.Vector3(x, y, z);
        }
        
        let currentTarget = null;
        
        // 游戏状态
        let score = 0;
        let timeLeft = 60;
        let gameActive = true;
        let bestScore = localStorage.getItem('valorant_best') ? parseInt(localStorage.getItem('valorant_best')) : 0;
        document.getElementById('bestValue').innerText = bestScore;
        
        // 统计变量
        let shotsFired = 0;
        let hits = 0;
        let headshots = 0;
        
        // --- 音效 (Web Audio) ---
        let audioCtx = null;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function playShootSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.value = 200;
            gain.gain.value = 0.2;
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now + 0.15);
        }
        function playHitSound(isHead = false) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = isHead ? 1200 : 660;
            gain.gain.value = 0.2;
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now + 0.1);
        }
        
        // --- 击中特效 (简化粒子数量提升性能)---
        let particles = [];
        function addHitEffect(position, isHead = false) {
            // 闪光
            const flashMat = new THREE.MeshStandardMaterial({
                color: isHead ? 0xff6666 : 0xffaa44,
                emissive: isHead ? 0xff2200 : 0xff6600,
                emissiveIntensity: 0.8,
                transparent: true,
                opacity: 1
            });
            const flash = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 6), flashMat);
            flash.position.copy(position);
            scene.add(flash);
            let startScale = 1, endScale = 2, duration = 180, startTime = performance.now();
            function animateFlash() {
                const now = performance.now();
                const t = Math.min(1, (now - startTime) / duration);
                const scale = startScale + (endScale - startScale) * t;
                flash.scale.set(scale, scale, scale);
                flash.material.opacity = 1 - t;
                if (t < 1) requestAnimationFrame(animateFlash);
                else scene.remove(flash);
            }
            requestAnimationFrame(animateFlash);
            
            // 碎片数量减少 (5~8个)
            const fragmentCount = Math.floor(Math.random() * 4) + 5;
            for (let i = 0; i < fragmentCount; i++) {
                const size = 0.04 + Math.random() * 0.04;
                const material = new THREE.MeshStandardMaterial({
                    color: isHead ? 0xdd8866 : 0xaa5533,
                    emissive: 0x442200,
                });
                const fragment = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), material);
                fragment.position.copy(position);
                scene.add(fragment);
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.6,
                    Math.random() * 0.5 + 0.2,
                    (Math.random() - 0.5) * 0.6
                ).normalize().multiplyScalar(0.12 + Math.random() * 0.12);
                particles.push({
                    mesh: fragment,
                    velocity: velocity,
                    startTime: performance.now(),
                    duration: 700
                });
            }
        }
        
        let lastTimestamp = performance.now();
        function updateParticles(now) {
            const delta = Math.min(0.033, (now - lastTimestamp) / 1000);
            lastTimestamp = now;
            for (let i = particles.length-1; i >= 0; i--) {
                const p = particles[i];
                const elapsed = (now - p.startTime) / 1000;
                if (elapsed >= p.duration / 1000) {
                    scene.remove(p.mesh);
                    particles.splice(i,1);
                    continue;
                }
                p.velocity.y -= 1.0 * delta;
                p.mesh.position.x += p.velocity.x * delta;
                p.mesh.position.y += p.velocity.y * delta;
                p.mesh.position.z += p.velocity.z * delta;
                const life = 1 - elapsed / (p.duration / 1000);
                p.mesh.material.opacity = life;
                p.mesh.material.transparent = true;
                p.mesh.scale.setScalar(0.8 + life * 0.5);
            }
        }
        
        // --- 射击逻辑（无瞄准移动，直接点击射击）---
        function shoot() {
            if (!gameActive) return;
            if (!currentTarget) return;
            
            shotsFired++;
            
            // 射线检测（从相机中心向前）
            const raycaster = new THREE.Raycaster();
            const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            raycaster.set(camera.position, direction);
            const intersects = raycaster.intersectObject(currentTarget, true);
            
            if (intersects.length > 0) {
                hits++;
                const hitObject = intersects[0].object;
                const isHead = hitObject.userData && hitObject.userData.isHead === true;
                if (isHead) headshots++;
                const addScore = isHead ? 25 : 10;
                score += addScore;
                updateUI();
                
                if (navigator.vibrate) navigator.vibrate(isHead ? 80 : 40);
                playHitSound(isHead);
                addHitEffect(intersects[0].point, isHead);
                
                scene.remove(currentTarget);
                currentTarget = null;
                spawnTarget();
            } else {
                playShootSound();
            }
        }
        
        function updateUI() {
            document.getElementById('scoreValue').innerText = score;
            document.getElementById('timeValue').innerText = Math.ceil(timeLeft);
        }
        
        function showStats() {
            const hitRate = shotsFired === 0 ? 0 : (hits / shotsFired * 100).toFixed(1);
            const headshotRate = hits === 0 ? 0 : (headshots / hits * 100).toFixed(1);
            const statsHtml = `
                <p>🎯 命中率: ${hitRate}% (${hits}/${shotsFired})</p>
                <p>💀 爆头率: ${headshotRate}% (${headshots}/${hits || 1})</p>
                <p>🏅 总得分: ${score}</p>
                <p>🏆 最高分: ${bestScore}</p>
            `;
            document.getElementById('statsPanel').innerHTML = statsHtml;
        }
        
        let timerInterval = null;
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                if (timeLeft > 0) {
                    timeLeft -= 0.1;
                    if (timeLeft < 0) timeLeft = 0;
                    updateUI();
                    if (timeLeft <= 0) endGame();
                }
            }, 100);
        }
        
        function endGame() {
            gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('valorant_best', bestScore);
                document.getElementById('bestValue').innerText = bestScore;
            }
            showStats();
            document.getElementById('gameOverPanel').style.display = 'block';
        }
        
        function restartGame() {
            score = 0;
            timeLeft = 60;
            gameActive = true;
            shotsFired = 0;
            hits = 0;
            headshots = 0;
            updateUI();
            if (currentTarget) scene.remove(currentTarget);
            spawnTarget();
            document.getElementById('gameOverPanel').style.display = 'none';
            if (timerInterval) clearInterval(timerInterval);
            startTimer();
        }
        
        function spawnTarget() {
            currentTarget = createTarget();
            const pos = getRandomPosition();
            currentTarget.position.copy(pos);
            scene.add(currentTarget);
        }
        
        // --- 事件监听（手机：点击屏幕射击；电脑：鼠标点击射击，同时保留鼠标瞄准）---
        // 电脑端鼠标瞄准（移动鼠标旋转视角）
        let mouseLocked = false;
        canvas.addEventListener('click', () => {
            if (!gameActive) return;
            // 电脑端：请求鼠标锁定以启用瞄准，但手机端不需要
            if (!('ontouchstart' in window)) {
                canvas.requestPointerLock();
            }
        });
        document.addEventListener('pointerlockchange', lockChange);
        document.addEventListener('mozpointerlockchange', lockChange);
        
        function lockChange() {
            if (document.pointerLockElement === canvas) {
                mouseLocked = true;
                document.addEventListener('mousemove', onMouseMove);
            } else {
                mouseLocked = false;
                document.removeEventListener('mousemove', onMouseMove);
            }
        }
        
        function onMouseMove(e) {
            if (!mouseLocked) return;
            const sensitivity = 0.002;
            yaw -= e.movementX * sensitivity;
            pitch -= e.movementY * sensitivity;
            pitch = Math.max(-pitchLimit, Math.min(pitchLimit, pitch));
            updateCameraDirection();
        }
        
        // 射击事件：手机点击直接射击；电脑端在锁定状态下点击射击（不锁定则也射击）
        function handleShoot(e) {
            if (!gameActive) return;
            // 防止点击UI按钮时触发
            if (e.target.closest('.ui-panel') || e.target.closest('.game-over')) return;
            shoot();
        }
        canvas.addEventListener('click', handleShoot);
        // 手机触摸事件（防止页面滚动）
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleShoot(e);
        }, { passive: false });
        
        // 阻止手机触摸滚动
        window.addEventListener('touchmove', (e) => {
            if (e.target === canvas) e.preventDefault();
        }, { passive: false });
        
        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now();
            updateParticles(now);
            renderer.render(scene, camera);
        }
        
        // 窗口尺寸适配（横屏自动适配）
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        function init() {
            spawnTarget();
            startTimer();
            updateUI();
            canvas.addEventListener('click', () => { initAudio(); }, { once: true });
            canvas.addEventListener('touchstart', () => { initAudio(); }, { once: true });
            animate();
        }
        
        document.getElementById('restartBtn').addEventListener('click', () => {
            restartGame();
        });
        
        init();
        console.log('靶场已启动 | 横屏优化 | 点击射击 | 手机无需滑动');
    </script>
</body>
</html>
